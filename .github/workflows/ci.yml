name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Check source formatting
        run: sbt scalafmtCheckAll
      - name: Compile with fatal warnings
        run: sbt -Dfile.encoding=UTF-8 'set ThisBuild / scalacOptions += "-Werror"' test
